name: Enhancement
about: Suggest an improvement to existing architecture assets
labels: [enhancement]
body:
  - type: input
    id: target
    attributes:
      label: Target Artifact
      description: ADR, pattern, diagram, or governance asset
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Expected Value
      description: Why this enhancement matters
    validations:
      required: true
